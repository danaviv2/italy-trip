var ZONES={all:['napoli','capri','amalfi','cilento','roma'],napoli:['napoli'],capri:['capri'],amalfi:['amalfi'],cilento:['cilento'],roma:['roma']};
var ZNAMES={napoli:'🏙 נאפולי',capri:'🏝 קפרי',amalfi:'🌊 חוף אמלפי',cilento:'🌿 צ\'ילנטו ופסטום',roma:'🏛 רומא'};

var days=load();
var curFilter='all';
var editMode=false;
var openDays={1:true};

function load(){
  try{var s=localStorage.getItem('italy_trip_v2');if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_DAYS));
}
function saveData(){
  try{
    collectEdits();
    localStorage.setItem('italy_trip_v2',JSON.stringify(days));
    showSave('נשמר ✓');
  }catch(e){showSave('שגיאה');}
}
function showSave(msg){
  var el=document.getElementById('savemsg');el.textContent=msg;
  setTimeout(function(){el.textContent='';},1500);
}
function resetData(){
  if(confirm('לאפס לתוכנית המקורית? כל השינויים יימחקו.')){
    days=JSON.parse(JSON.stringify(DEFAULT_DAYS));
    localStorage.removeItem('italy_trip_v2');
    render(curFilter);
  }
}
function toggleEdit(){
  if(editMode)collectEdits();
  editMode=!editMode;
  document.getElementById('editBtn').classList.toggle('on',editMode);
  document.getElementById('editBtn').textContent=editMode?'✓ סיים עריכה':'✏️ ערוך תוכנית';
  document.body.classList.toggle('edit-on',editMode);
  render(curFilter);
}
function collectEdits(){
  // Read all contenteditable fields back into data
  document.querySelectorAll('[data-edit]').forEach(function(el){
    var path=el.getAttribute('data-edit').split('|');
    var dn=parseInt(path[0]),field=path[1],ri=path[2];
    var day=days.find(function(d){return d.n===dn;});
    if(!day)return;
    if(ri===undefined||ri===''){day[field]=el.innerText.trim();}
    else{day.rows[parseInt(ri)][field]=el.innerText.trim();}
  });
}
function delRow(dn,ri){
  collectEdits();
  var day=days.find(function(d){return d.n===dn;});
  day.rows.splice(ri,1);
  render(curFilter);
}
function addRow(dn){
  collectEdits();
  var day=days.find(function(d){return d.n===dn;});
  day.rows.push({t:'00:00',i:'📍',n:'פעילות חדשה',d:'תיאור',e:'',b:''});
  render(curFilter);
}
function ed(dn,field,ri,val){
  if(!editMode)return val||'';
  var attr=dn+'|'+field+'|'+(ri===undefined?'':ri);
  return '<span contenteditable="true" data-edit="'+attr+'">'+(val||'')+'</span>';
}

function render(z){
  curFilter=z;
  if(z==='tips'){renderTips();return;}
  var zlist=ZONES[z]||ZONES.all;
  var h='',prev='';
  days.forEach(function(day){
    if(zlist.indexOf(day.z)<0)return;
    if(day.z!==prev){h+='<div class="zone-ttl">'+ZNAMES[day.z]+'</div>';prev=day.z;}
    var isOpen=openDays[day.n];
    var tags=(day.tags||[]).map(function(t){return'<span class="dtag">'+t+'</span>';}).join('');
    var rows=(day.rows||[]).map(function(r,ri){
      var bx=r.b==='f'?'<span class="bx bf">🍴 אוכל</span>':r.b==='t'?'<span class="bx bt">💡 טיפ</span>':r.b==='p'?'<span class="bx bp">⭐ חובה</span>':r.x?'<span class="bx bn">✨ נסתר</span>':'';
      var del=editMode?'<button class="del-row" onclick="delRow('+day.n+','+ri+')">🗑 מחק</button>':'';
      var extra=(r.e||editMode)?'<div class="re">'+ed(day.n,'e',ri,r.e)+'</div>':'';
      return'<div class="row'+(r.x?' nx':'')+'"><div class="rt">'+ed(day.n,'t',ri,r.t)+'</div><div class="ri">'+ed(day.n,'i',ri,r.i)+'</div><div><div class="rn">'+ed(day.n,'n',ri,r.n)+bx+'</div><div class="rd">'+ed(day.n,'d',ri,r.d)+'</div>'+extra+del+'</div></div>';
    }).join('');
    var addBtn=editMode?'<button class="add-row" onclick="addRow('+day.n+')">＋ הוסף פעילות</button>':'';
    var hotel=(day.hotel||editMode)?'<div class="hotel-row">🏨 לינה: <strong>'+ed(day.n,'hotel','',day.hotel)+'</strong></div>':'';
    var secret=(day.secret||editMode)?'<div class="secret-box"><strong>💎 הפינה הנסתרת של ג\'אנלוקה</strong>'+ed(day.n,'secret','',day.secret)+'</div>':'';
    var mapHtml='';
    if(day.pins&&day.pins.length&&!editMode){
      var pinsHtml=day.pins.map(function(p){
        return'<div class="pin-item"><div class="pin-icon">'+p.i+'</div><div><div class="pin-name">'+p.n+'</div><a class="pin-link" href="https://www.google.com/maps/search/'+encodeURIComponent(p.q)+'" target="_blank">📍 פתח במפה</a></div></div>';
      }).join('');
      var dir=day.pins.map(function(p){return encodeURIComponent(p.q);}).join('/');
      mapHtml='<div class="map-wrap"><div class="map-hdr">📍 נקודות יום '+day.n+'</div><div class="map-pins">'+pinsHtml+'</div><a class="map-btn" href="https://www.google.com/maps/dir/'+dir+'" target="_blank">🗺 פתח מסלול יום '+day.n+' ב-Google Maps ↗</a></div>';
    }
    h+='<div class="day"><div class="day-hdr" onclick="toggleDay('+day.n+')"><div class="day-num">'+day.n+'</div><div class="day-info"><div class="day-ttl">'+day.ttl+'</div><div class="day-meta">'+day.sub+'</div><div class="day-tags">'+tags+'</div></div><div class="day-date">'+day.d+'</div><div class="arr'+(isOpen?' op':'')+'">▼</div></div><div class="body'+(isOpen?' op':'')+'">'+secret+mapHtml+'<div class="rows-wrap">'+rows+addBtn+'</div>'+hotel+'</div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

function renderTips(){
  var h='<div class="zone-ttl" style="margin-top:0">💡 טיפים למסע</div><div class="tips-sec">';
  tips.forEach(function(cat){
    h+='<div class="tips-cat"><h4>'+cat.cat+'</h4><ul>';
    cat.items.forEach(function(it){h+='<li class="'+(it.w?'warn':'')+'">'+it.t+'</li>';});
    h+='</ul></div>';
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function toggleDay(n){
  if(editMode)collectEdits();
  openDays[n]=!openDays[n];
  render(curFilter);
}
function go(z,btn){
  if(editMode)collectEdits();
  document.querySelectorAll('#fbar button').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  render(z);
}

// Auto-save edits on blur
document.addEventListener('blur',function(e){
  if(e.target.hasAttribute&&e.target.hasAttribute('data-edit')){
    collectEdits();
    try{localStorage.setItem('italy_trip_v2',JSON.stringify(days));}catch(err){}
  }
},true);

render('all');
</script>
